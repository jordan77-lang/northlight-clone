<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northlight Gallery - 3D Environment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 5px;
        }
        #modeSelector {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        .mode-button {
            padding: 8px 15px;
            margin: 5px 0;
            border: 2px solid #666;
            background: rgba(100, 100, 100, 0.5);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .mode-button:hover:not(:disabled) {
            background: rgba(100, 100, 100, 0.8);
            border-color: white;
        }
        .mode-button.active {
            background: rgba(0, 150, 0, 0.8);
            border-color: #00ff00;
        }
        .mode-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #debugCheckbox {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #666;
        }
        #debugCheckbox label {
            display: flex;
            align-items: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        #debugCheckbox input {
            margin-right: 8px;
            cursor: pointer;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 200;
        }
        canvas {
            display: block;
        }
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
        }
        /* ── Touch joystick ── */
        #touchJoystick {
            display: none;
            position: fixed;
            bottom: 36px;
            left: 36px;
            width: 120px;
            height: 120px;
            z-index: 200;
            touch-action: none;
            user-select: none;
        }
        #touchJoystick .jBase {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.45);
        }
        #touchJoystick .jKnob {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.55);
            border: 2px solid rgba(255,255,255,0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        /* ── Touch look overlay (right 60% of screen) ── */
        #touchLook {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            z-index: 190;
            touch-action: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="modeSelector">
        <button class="mode-button active" id="gameModeBtn">Game Mode</button>
        <button class="mode-button" id="exploreModeBtn">Explore Mode</button>
        <div id="debugCheckbox">
            <label>
                <input type="checkbox" id="debugModeCheckbox">
                Debug Mode
            </label>
        </div>
    </div>
    <div id="info">
        <h2>Northlight Gallery</h2>
        <div id="controlsInfo">
            <p><strong>Game Mode Controls:</strong></p>
            <p>WASD / Arrow Keys - Move</p>
            <p>Mouse - Look around</p>
            <p style="color: red;text-transform: uppercase;">Click to enter game mode</p>
            <p>ESC - Release mouse</p>
        </div>
    </div>
    <div id="vignette"></div>
    <div id="loading">Loading...</div>

    <!-- Touch game mode controls -->
    <div id="touchJoystick">
        <div class="jBase"></div>
        <div class="jKnob" id="jKnob"></div>
    </div>
    <div id="touchLook"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="script.js">
    </script>



</body>
</html>
