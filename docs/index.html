<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northlight Gallery - 3D Environment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 5px;
        }
        #modeSelector {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        .mode-button {
            padding: 8px 15px;
            margin: 5px 0;
            border: 2px solid #666;
            background: rgba(100, 100, 100, 0.5);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .mode-button:hover:not(:disabled) {
            background: rgba(100, 100, 100, 0.8);
            border-color: white;
        }
        .mode-button.active {
            background: rgba(0, 150, 0, 0.8);
            border-color: #00ff00;
        }
        .mode-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #debugCheckbox {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #666;
        }
        #debugCheckbox label {
            display: flex;
            align-items: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        #debugCheckbox input {
            margin-right: 8px;
            cursor: pointer;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 200;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="modeSelector">
        <button class="mode-button active" id="gameModeBtn">Game Mode</button>
        <button class="mode-button" id="exploreModeBtn">Explore Mode</button>
        <div id="debugCheckbox">
            <label>
                <input type="checkbox" id="debugModeCheckbox">
                Debug Mode
            </label>
        </div>
    </div>
    <div id="info">
        <h2>Northlight Gallery</h2>
        <div id="controlsInfo">
            <p><strong>Game Mode Controls:</strong></p>
            <p>WASD / Arrow Keys - Move</p>
            <p>Mouse - Look around</p>
            <p style="color: red;text-transform: uppercase;">Click to enter game mode</p>
            <p>ESC - Release mouse</p>
        </div>
    </div>
    <div id="loading">Loading...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { VRButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js';
        import { GLTFExporter } from 'https://unpkg.com/three@0.160.0/examples/jsm/exporters/GLTFExporter.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5.2, 30); 
        
        // Door positions and wall colliders for game mode
        let doorPositions = {};
        let wallColliders = []; // Array of bounding boxes for collision detection

        // =====================================================
        // WALKABLE BOUNDARY DEBUG VISUALS
        // =====================================================
        const walkDebugGroup = new THREE.Group();
        walkDebugGroup.visible = false;
        scene.add(walkDebugGroup);

        // Flat roof group — populated later, shown only in game mode
        let roofGroup = null;



        function buildWalkDebug() {
            walkDebugGroup.clear();

            const playerRadius = 1.5;

            // Wall colliders — red boxes expanded by player radius
            const redMat = new THREE.LineBasicMaterial({ color: 0xff2222 });
            for (const wall of wallColliders) {
                const w = (wall.max.x - wall.min.x) + playerRadius * 2;
                const h = wall.max.y - wall.min.y;
                const d = (wall.max.z - wall.min.z) + playerRadius * 2;
                const cx = (wall.min.x + wall.max.x) / 2;
                const cy = (wall.min.y + wall.max.y) / 2;
                const cz = (wall.min.z + wall.max.z) / 2;
                const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d));
                const box = new THREE.LineSegments(edges, redMat.clone());
                box.position.set(cx, cy, cz);
                walkDebugGroup.add(box);
            }
        }

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.shadowMap.enabled = false;
        renderer.toneMapping = THREE.NoToneMapping;
        renderer.localClippingEnabled = true; // Enable local clipping for Y-axis cropping
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // VR button — only shown when in game mode
        const vrButtonInner = VRButton.createButton(renderer);
        const vrButton = document.createElement('div');
        vrButton.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:none;';
        vrButton.appendChild(vrButtonInner);
        document.body.appendChild(vrButton);

        // Keep camera rig at correct eye height in VR
        renderer.xr.addEventListener('sessionstart', () => {
            needsRender = true;
        });
        renderer.xr.addEventListener('sessionend', () => {
            needsRender = true;
        });

        // =====================================================
        // NAVIGATION MODE SETUP
        // =====================================================
        
        // Detect if device is mobile/touch
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
        };
        
        const isMobile = isMobileDevice();
        let currentMode = 'explore';
        let needsRender = true;
        let isLocked = false;
        
        // UI Setup
        const gameModeBtn = document.getElementById('gameModeBtn');
        const exploreModeBtn = document.getElementById('exploreModeBtn');
        const controlsInfo = document.getElementById('controlsInfo');
        
        if (isMobile) {
            gameModeBtn.disabled = true;
        }
        
        let pointerLockReady = false;

        function setMode(mode) {
            currentMode = mode;
            needsRender = true;
            if (mode === 'game') {
                pointerLockReady = false; // require one extra click inside the canvas
                gameModeBtn.classList.add('active');
                exploreModeBtn.classList.remove('active');
                controlsInfo.innerHTML = `
                    <p><strong>Game Mode Controls:</strong></p>
                    <p>WASD / Arrow Keys - Move</p>
                    <p>Mouse - Look around</p>
                    <p style="color: red; background:white; padding:2px 5px;text-transform: uppercase;">Click anywhere to enable navigation</p>
                    <p>(press ESC to release mouse lock)</p>
                `;
                isLocked = false;
                camera.position.set(-4, 5.2, 20);
                yaw = 0; // Face inward (toward the gallery)
                pitch = 0;
                const spawnEuler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(spawnEuler);
                buildWalkDebug();
                walkDebugGroup.visible = debugMode;
                if (roofGroup) roofGroup.visible = true;
                vrButton.style.display = '';
                needsRender = true;
            } else {
                gameModeBtn.classList.remove('active');
                exploreModeBtn.classList.add('active');
                controlsInfo.innerHTML = `
                    <p><strong>Explore Mode Controls:</strong></p>
                    <p>Mouse Drag - Rotate</p>
                    <p>Shift + Drag - Pan</p>
                    <p>Scroll / Pinch - Zoom</p>
                    <p>Two-finger Drag - Rotate (touch)</p>\
                `;
                walkDebugGroup.visible = false;
                if (roofGroup) roofGroup.visible = false;
                vrButton.style.display = 'none';
                needsRender = true;
            }
        }
        
        gameModeBtn.addEventListener('click', () => setMode('game'));
        exploreModeBtn.addEventListener('click', () => setMode('explore'));
        
        // Initialize to explore mode
        setMode('explore');
        
        // Debug mode checkbox
        const debugCheckbox = document.getElementById('debugModeCheckbox');
        debugCheckbox.addEventListener('change', (event) => {
            debugMode = event.target.checked;
            walkDebugGroup.visible = debugMode && currentMode === 'game';
            if (modelScene) {
                updateDebugLabels(modelScene);
                needsRender = true;
            }
        });
        
        // Explore mode camera state
        let exploreCameraDistance = 70;
        let exploreCameraPan = new THREE.Vector2(0, 0);
        let exploreRotation = new THREE.Vector2(0.5, 0.5);
        let lastExploreMousePos = new THREE.Vector2(0, 0);
        let isExploreRightClick = false;

        document.body.appendChild(renderer.domElement);

        // Load the Northlight 3D model
        const gltfLoader = new GLTFLoader();
        const textureLoader = new THREE.TextureLoader();
        let modelScene = null;
        let windowModel = null;
        let frontDoorModel = null;
        let tableModel = null;
        let sofaModel = null;
        let table2Model = null;
        let sofa2Model = null;
        let sqPedestalModel = null; // unused — now using box geometry
        let recPedestalModel = null;
        let m2PedestalModel = null;
        let m1PedestalModel = null;
        let mSeatModel = null;
        let backdoorModel = null;
        let b1SeatModel = null;
        let b2SeatModel = null;
        let book1Model = null;
        let book2Model = null;
        const wallVisuals = new THREE.Group();
        scene.add(wallVisuals);

        // Load window model
        gltfLoader.load('./building/window.glb', (gltf) => {
            windowModel = gltf.scene;
            windowModel.scale.set(12, 12, 12);
            windowModel.rotation.y = Math.PI; // Rotate 180 degrees to face the correct direction
            windowModel.position.set(0, 0, -10);
            // make reflective material for windows
            windowModel.traverse((child) => {
                if (child.isMesh) {
                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach(mat => {
                        if (mat) {
                            mat.envMapIntensity = 1.0;
                            mat.metalness = 0.8;
                            mat.roughness = 0.2;
                            mat.color.set(0xffffff);
                        }
                    });
                }
            });
            console.log('Window model loaded');
        }, undefined, (error) => {
            console.error('Error loading window model:', error);
        });

        // Load front door model
        gltfLoader.load('./building/frontdoor.glb', (gltf) => {
            frontDoorModel = gltf.scene;
            frontDoorModel.scale.set(10, 10, 10);
            frontDoorModel.position.set(0, 0, 10);
            console.log('Front door model loaded');
        }, undefined, (error) => {
            console.error('Error loading front door model:', error);
        });

        // Load table model
        gltfLoader.load('./building/table.glb', (gltf) => {
            tableModel = gltf.scene;
            tableModel.scale.set(12, 12, 12);
            console.log('Table model loaded');
        }, undefined, (error) => {
            console.error('Error loading table model:', error);
        });

        // Load sofa model
        gltfLoader.load('./building/sofa.glb', (gltf) => {
            sofaModel = gltf.scene;
            sofaModel.scale.set(10, 10, 10);
            console.log('Sofa model loaded');
        }, undefined, (error) => {
            console.error('Error loading sofa model:', error);
        });

        // Load table2 model
        gltfLoader.load('./building/table2.glb', (gltf) => {
            table2Model = gltf.scene;
            table2Model.scale.set(10, 10, 10);
            console.log('Table2 model loaded');
        }, undefined, (error) => {
            console.error('Error loading table2 model:', error);
        });

        // Load sofa2 model
        gltfLoader.load('./building/sofa2.glb', (gltf) => {
            sofa2Model = gltf.scene;
            sofa2Model.scale.set(10, 10, 10);
            console.log('Sofa2 model loaded');
        }, undefined, (error) => {
            console.error('Error loading sofa2 model:', error);
        });

        // sqPedestal / recPedestal / m2Pedestal / m1Pedestal — replaced with box geometry, no GLB needed

        // Load mSeat model
        gltfLoader.load('./building/mSeat.glb', (gltf) => {
            mSeatModel = gltf.scene;
            mSeatModel.scale.set(10, 10, 10);
            console.log('mSeat model loaded');
        }, undefined, (error) => {
            console.error('Error loading mSeat model:', error);
        });

        // Load backdoor model
        gltfLoader.load('./building/backdoor.glb', (gltf) => {
            backdoorModel = gltf.scene;
            backdoorModel.scale.set(7, 7, 7);
            backdoorModel.position.set(0, -1, 10);
            console.log('Backdoor model loaded');
        }, undefined, (error) => {
            console.error('Error loading backdoor model:', error);
        });

        // Load b1Seat model
        gltfLoader.load('./building/b1Seat.glb', (gltf) => {
            b1SeatModel = gltf.scene;
            b1SeatModel.scale.set(7, 7, 7);
            console.log('b1Seat model loaded');
        }, undefined, (error) => {
            console.error('Error loading b1Seat model:', error);
        });

        // Load b2Seat model
        gltfLoader.load('./building/b2Seat.glb', (gltf) => {
            b2SeatModel = gltf.scene;
            b2SeatModel.scale.set(10, 10, 10);
            console.log('b2Seat model loaded');
        }, undefined, (error) => {
            console.error('Error loading b2Seat model:', error);
        });

        // Load book1 model
        gltfLoader.load('./building/book1.glb', (gltf) => {
            book1Model = gltf.scene;
            console.log('book1 model loaded');
        }, undefined, (error) => {
            console.error('Error loading book1 model:', error);
        });

        // Load book2 model
        gltfLoader.load('./building/book2.glb', (gltf) => {
            book2Model = gltf.scene;
            console.log('book2 model loaded');
        }, undefined, (error) => {
            console.error('Error loading book2 model:', error);
        });

        gltfLoader.load('Northlight.glb', (gltf) => {
            const model = gltf.scene;
            modelScene = model;
            
            // Scale up the model
            model.scale.set(10, 10, 10);
            model.position.set(0, 14, 0);
            
            // Calculate model bounds to set up Y-axis clipping and ground footprint
            model.updateWorldMatrix(true, false);
            const modelBbox = new THREE.Box3().setFromObject(model);
            const modelHeight = modelBbox.max.y - modelBbox.min.y;
            const cropHeight = modelBbox.min.y + modelHeight * 0.7; // Keep 70% from bottom (clip top 30%)
            
            // Create clipping plane to hide top 30% (plane normal points down to keep bottom)
            modelClippingPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), cropHeight);
            

            
            // Apply clipping plane to all materials
            wallpaperMaterial.clippingPlanes = [modelClippingPlane];
            brickMaterial.clippingPlanes = [modelClippingPlane];
            whiteMaterial.clippingPlanes = [modelClippingPlane];
            greenMaterial.clippingPlanes = [modelClippingPlane];
            yellowMaterial.clippingPlanes = [modelClippingPlane];
            
            // Find door positions and wall colliders
            model.traverse((child) => {
                if (child.isMesh) {
                    // Apply clipping plane to existing materials
                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach(mat => {
                        if (mat) {
                            mat.clippingPlanes = [modelClippingPlane];
                        }
                    });
                    
                    const bbox = new THREE.Box3().setFromObject(child);
                    const center = bbox.getCenter(new THREE.Vector3());
                    const size = bbox.getSize(new THREE.Vector3());
                    const name = child.name.toLowerCase();
                    
                    // Store door positions
                    if (name.includes('door')) {
                        doorPositions[child.name] = center.clone();
                        console.log('Found door:', child.name, 'at position:', center);
                    }
                    
                    // Detect and store wall colliders (tall structures)
                    if (size.y > 5 && (size.x > 1 || size.z > 1)) {
                        wallColliders.push(bbox.clone());
                        console.log('Added wall collider:', child.name, 'Size:', size);
                    }
                }
            });
            
            // Apply materials to walls and windows
            colorizeModel(model);
            
            // Enable shadows on the model
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(model);
            
            // Replace windows with window.glb model (with a small delay to ensure it's loaded)
            setTimeout(() => {
                console.log('Checking models - windowModel:', !!windowModel, 'frontDoorModel:', !!frontDoorModel, 'tableModel:', !!tableModel, 'sofaModel:', !!sofaModel, 'table2Model:', !!table2Model, 'sofa2Model:', !!sofa2Model, 'sqPedestalModel:', !!sqPedestalModel, 'recPedestalModel:', !!recPedestalModel, 'm2PedestalModel:', !!m2PedestalModel, 'm1PedestalModel:', !!m1PedestalModel, 'mSeatModel:', !!mSeatModel, 'backdoorModel:', !!backdoorModel, 'b1SeatModel:', !!b1SeatModel, 'b2SeatModel:', !!b2SeatModel);
                if (windowModel) replaceWindowsWithModel(model);
                if (frontDoorModel) replaceDoorWithModel(model);
                if (backdoorModel) addBackdoorToScene();
                if (tableModel) addTableToScene();
                if (sofaModel) addSofaToScene();
                if (table2Model) addTable2ToScene();
                if (sofa2Model) addSofa2ToScene();
                if (b1SeatModel) addB1SeatToScene();
                if (b2SeatModel) addB2SeatToScene();
                if (book1Model) addBook1ToScene();
                if (book2Model) addBook2ToScene();
                addSqPedestalToScene();
                addRecPedestalToScene();
                addM2PedestalToScene();
                addM1PedestalToScene();
                if (mSeatModel) addMSeatToScene();
                needsRender = true; // Trigger render after models are added
            }, 500);
            
            // Update debug labels if needed
            updateDebugLabels(model);
            
            // Trigger render now that model is loaded
            needsRender = true;
        }, undefined, (error) => {
            console.error('Error loading Northlight model:', error);
        });

        // Procedural concrete floor texture
        // Floor texture — rust-shader style (octave fbm noise) in concrete colors
        // Recreates boytchev TSL rust using Canvas 2D pixel loop
        function createConcreteTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');

            // --- Value noise helpers (tileable via modular grid) ---
            const PERM_SIZE = 256;
            const perm = new Uint8Array(PERM_SIZE);
            for (let i = 0; i < PERM_SIZE; i++) perm[i] = i;
            for (let i = PERM_SIZE - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [perm[i], perm[j]] = [perm[j], perm[i]];
            }

            function fade(t) { return t * t * (3 - 2 * t); }

            function grad(hash, x, y) {
                const h = hash & 3;
                const u = h < 2 ? x : y;
                const v = h < 2 ? y : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
            }

            function noise2(x, y) {
                const X = Math.floor(x) & (PERM_SIZE - 1);
                const Y = Math.floor(y) & (PERM_SIZE - 1);
                const xf = x - Math.floor(x), yf = y - Math.floor(y);
                const u = fade(xf), v = fade(yf);
                const a  = perm[(X)     & 255] + Y;
                const b  = perm[(X + 1) & 255] + Y;
                const aa = perm[a & 255],       ab = perm[(a + 1) & 255];
                const ba = perm[b & 255],       bb = perm[(b + 1) & 255];
                return (
                    (1 - v) * ((1 - u) * grad(perm[aa], xf,     yf    ) + u * grad(perm[ba], xf - 1, yf    )) +
                           v * ((1 - u) * grad(perm[ab], xf,     yf - 1) + u * grad(perm[bb], xf - 1, yf - 1))
                );
            }

            // --- Rust fbm kernel: scale=2, iterations=8, amount=-0.3 ---
            const SCALE = 2.0, ITERS = 8, AMOUNT = -0.3;
            const freq0 = Math.exp(SCALE / 4 - 1); // ~1.0

            function rustK(nx, ny) {
                let px = nx * freq0, py = ny * freq0;
                let k = noise2(px, py);
                for (let i = 0; i < ITERS; i++) {
                    px *= 2; py *= 2;
                    k += noise2(px, py);
                }
                k -= Math.abs(noise2(px * 2, py * 2));
                k = Math.max(0, Math.min(15, k - (AMOUNT * (noise2(px * (AMOUNT / 2 + 4), py * (AMOUNT / 2 + 4)) + 4))));
                // Apply same transform as shader: k * 1.25, then pow(0.5)
                k = Math.sqrt(k * 1.25);
                return Math.max(0, Math.min(1, k / 3.5)); // normalise to 0..1
            }

            // --- Concrete palette: dark stained base ↔ light weathered surface ---
            // background (dark wet / shadowed concrete): rgb(52, 50, 46)
            // color      (light dry concrete face):      rgb(175, 170, 162)
            const bgR = 8,   bgG = 8,   bgB = 8;
            const fgR = 55,  fgG = 53,  fgB = 50;

            const img = ctx.createImageData(size, size);
            const d = img.data;

            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    // Map pixel to [0, 4] noise space (tileable by keeping coordinates rational)
                    const nx = (px / size) * 4;
                    const ny = (py / size) * 4;
                    const t = rustK(nx, ny);

                    // Mix: t=0 → foreground (light), t=1 → background (dark)
                    const r = Math.round(fgR + (bgR - fgR) * t);
                    const g = Math.round(fgG + (bgG - fgG) * t);
                    const b = Math.round(fgB + (bgB - fgB) * t);

                    const idx = (py * size + px) * 4;
                    d[idx]   = r;
                    d[idx+1] = g;
                    d[idx+2] = b;
                    d[idx+3] = 255;
                }
            }
            ctx.putImageData(img, 0, 0);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.MirroredRepeatWrapping;
            tex.wrapT = THREE.MirroredRepeatWrapping;
            tex.repeat.set(4, 9);
            tex.magFilter = THREE.LinearFilter;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            return tex;
        }

        // Exterior ground
        const groundGeometry = new THREE.PlaneGeometry(84.8, 186);
        const groundMaterial = new THREE.MeshStandardMaterial({
            map: createConcreteTexture(),
            roughness: 0.85,
            metalness: 0.0
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(-1, -1.8, -49.4);
        ground.receiveShadow = true;
        scene.add(ground);

        // Add sky blue box
        const boxGeometry = new THREE.BoxGeometry(34, 3, 15);
        const boxMaterial = new THREE.MeshBasicMaterial({ color: 0x87CEEB });
        const box = new THREE.Mesh(boxGeometry, boxMaterial);
        box.position.set(-28.5, -3, 40.5);
        scene.add(box);

        // =====================================================
        // FLAT ROOF — wooden beams, visible only in game mode
        // =====================================================

        (function buildFlatRoof() {

            // ── Wood texture (warm medium-dark like photo) ─────────────────
            // Canvas 2D port of boytchev processed-wood TSL texture
            // Algorithm: noise(pos*vec3(xscale,xscale*len,xscale*len)) modulated by
            // high-freq grain noise, then smoothstepped to ring bands.
            function mkWood() {
                const W = 256, H = 512;
                const cv = document.createElement('canvas');
                cv.width = W; cv.height = H;
                const cx = cv.getContext('2d');

                // 3D Perlin noise setup
                const P = new Uint8Array(512);
                for (let i = 0; i < 256; i++) P[i] = i;
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [P[i], P[j]] = [P[j], P[i]];
                }
                for (let i = 0; i < 256; i++) P[256 + i] = P[i];

                function fade(t) { return t * t * (3 - 2 * t); }
                function lerp(a, b, t) { return a + t * (b - a); }
                function g3(h, x, y, z) {
                    h &= 15;
                    const u = h < 8 ? x : y;
                    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
                    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
                }
                function noise3(x, y, z) {
                    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                    x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                    const u = fade(x), v = fade(y), w = fade(z);
                    const A = P[X]+Y, AA = P[A]+Z, AB = P[A+1]+Z, B = P[X+1]+Y, BA = P[B]+Z, BB = P[B+1]+Z;
                    return lerp(
                        lerp(lerp(g3(P[AA],x,y,z),   g3(P[BA],x-1,y,z),  u),
                             lerp(g3(P[AB],x,y-1,z), g3(P[BB],x-1,y-1,z),u), v),
                        lerp(lerp(g3(P[AA+1],x,y,z-1),   g3(P[BA+1],x-1,y,z-1),  u),
                             lerp(g3(P[AB+1],x,y-1,z-1), g3(P[BB+1],x-1,y-1,z-1),u), v),
                        w
                    );
                }

                // Processed-wood shader parameters (matching TSL defaults)
                const SCALE = 2, LENGTHS = 4, STRENGTH = 0.3;
                const xscale = SCALE / 2 + 1;          // 2
                const len    = 1 / (LENGTHS + 5);      // 1/9 ≈ 0.111
                const expS   = Math.exp(SCALE);         // e^2 ≈ 7.389

                // Color palette matching the boytchev defaults but warm wood tones
                // color (grain/dark): #702020 → warm dark brown  background (light): #F0D0A0 → light tan
                const cR = 0x18, cG = 0x0a, cB = 0x04;
                const bgR = 0x48, bgG = 0x30, bgB = 0x18;

                const img = cx.createImageData(W, H);
                const d = img.data;

                for (let py = 0; py < H; py++) {
                    for (let px = 0; px < W; px++) {
                        // Shader X = along grain (beam length → texture Y)
                        // Shader Y = across grain (beam width → texture X)
                        const sx = (py / H) * expS;
                        const sy = (px / W) * expS;
                        const sz = 0.5; // slight Z offset to avoid flat artefacts

                        // k = noise(pos * vec3(xscale, xscale*len, xscale*len))
                        let k = noise3(sx * xscale, sy * xscale * len, sz * xscale * len);

                        // k *= (noise(pos * vec3(25,1,1)) - 1) * 0.2
                        k *= (noise3(sx * 25, sy, sz) - 1) * 0.2;

                        // k = 1 - smoothstep(-0.3, 0.3, k + strength - 0.5)
                        const kk = k + STRENGTH - 0.5;
                        const t  = Math.max(0, Math.min(1, (kk + 0.3) / 0.6));
                        const sm = t * t * (3 - 2 * t);
                        const result = 1 - sm;

                        // mix(color, background, result)
                        const r = Math.round(cR + (bgR - cR) * result);
                        const g = Math.round(cG + (bgG - cG) * result);
                        const b = Math.round(cB + (bgB - cB) * result);

                        const idx = (py * W + px) * 4;
                        d[idx] = r; d[idx+1] = g; d[idx+2] = b; d[idx+3] = 255;
                    }
                }
                cx.putImageData(img, 0, 0);

                const t = new THREE.CanvasTexture(cv);
                t.wrapS = t.wrapT = THREE.RepeatWrapping;
                return t;
            }

            const woodTex = mkWood();

            // MeshBasicMaterial to stay lit regardless of ambient (consistent with rest of scene)
            const beamMat = new THREE.MeshStandardMaterial({ map: woodTex, color: 0xffffff });
            // Cross-brace metal — near-black painted steel like photo
            const braceMat = new THREE.MeshStandardMaterial({ color: 0xa0a0a0 });
            // Dark void above the beams
            const darkMat = new THREE.MeshBasicMaterial({ color: 0x151210, side: THREE.BackSide });
            // Can-light housing — matte white disc
            const canMat  = new THREE.MeshBasicMaterial({ color: 0xe8e8e0 });
            // Can-light emissive lens — bright white circle
            const lensMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            roofGroup = new THREE.Group();
            roofGroup.name = 'flatRoof';
            roofGroup.visible = false;

            const X1 = -42, X2 = 42;
            const Z1 = -142, Z2 = 44;
            const W  = X2 - X1;   // 84
            const D  = Z2 - Z1;   // 186
            const CX = (X1+X2)*0.5;
            const CZ = (Z1+Z2)*0.5;

            const CEIL_Y = 28;       // top-of-structure / deck height

            // ── Primary joists: run along Z (gallery depth), spaced along X ──
            const JOIST_SPACING = 7;  // gap between joists
            const JW = 0.55;          // joist face-width
            const JH = 2.0;           // joist depth (hangs down)
            const JY = CEIL_Y - JH * 0.5;

            function addBox(x, y, z, w, h, d, mat) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(x, y, z);
                roofGroup.add(m);
            }

            // Joists spanning full gallery WIDTH (X axis), spaced along Z
            const joistXs = [];  // reused by brace loop — stores Z positions of joists
            for (let z = Z1; z <= Z2 + 0.01; z += JOIST_SPACING) {
                joistXs.push(z);
                addBox(CX, JY, z, W, JH, JW, beamMat);
            }

            // ── Cross-blocking / purlins: run along Z, spaced along X ──
            const CROSS_SPACING = 9;
            const CW = 0.4;   // cross-piece width
            const CH = 1.4;   // cross-piece depth (shallower than joists)
            const CY = CEIL_Y - CH * 0.5 - 0.05; // hang from same top face

            const crossZs = [];  // stores X positions of cross-pieces
            for (let x = X1; x <= X2 + 0.01; x += CROSS_SPACING) {
                crossZs.push(x);
                addBox(x, CY, CZ, CW, CH, D, beamMat);
            }

            // ── Ledger beams on short end walls (front & back) ──
            addBox(CX, JY, Z1 + JW*0.5, W, JH, JW, beamMat);
            addBox(CX, JY, Z2 - JW*0.5, W, JH, JW, beamMat);

            // ── X-diagonal bracing between adjacent joist bays ──
            const BT = 0.18;
            const BW = 0.12;

            for (let zi = 0; zi < joistXs.length - 1; zi++) {
                for (let xi = 0; xi < crossZs.length - 1; xi++) {
                    const bz = (joistXs[zi] + joistXs[zi+1]) * 0.5;
                    const bx = (crossZs[xi] + crossZs[xi+1]) * 0.5;
                    const spanZ = joistXs[zi+1] - joistXs[zi];
                    const spanX = crossZs[xi+1] - crossZs[xi];
                    const len   = Math.sqrt(spanX*spanX + spanZ*spanZ);
                    const angleY = Math.atan2(spanX, spanZ);

                    // Diagonal 1  (\)
                    const d1 = new THREE.Mesh(new THREE.BoxGeometry(BW, BT, len), braceMat);
                    d1.position.set(bx, CEIL_Y - JH + BT*0.5, bz);
                    d1.rotation.y = angleY;
                    roofGroup.add(d1);

                    // Diagonal 2  (/)
                    const d2 = new THREE.Mesh(new THREE.BoxGeometry(BW, BT, len), braceMat);
                    d2.position.set(bx, CEIL_Y - JH + BT*0.5, bz);
                    d2.rotation.y = -angleY;
                    roofGroup.add(d2);
                }
            }

            // ── Dark deck above ──
            const deck = new THREE.Mesh(new THREE.PlaneGeometry(W, D), darkMat);
            deck.rotation.x = Math.PI * 0.5;
            deck.position.set(CX, CEIL_Y + 0.05, CZ);
            roofGroup.add(deck);

            // ── Translucent black top plane (covers roof exterior) ──
            const topMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
            const topPlane = new THREE.Mesh(new THREE.PlaneGeometry(W+100, D+100), topMat);
            topPlane.rotation.x = Math.PI * 0.5;
            topPlane.position.set(CX, CEIL_Y + 0.2, CZ);
            roofGroup.add(topPlane);

            // ── Can lights — hanging at regular grid between joists ──
            const CAN_R    = 0.45;   // housing radius
            const CAN_H    = 0.35;   // housing depth
            const LENS_R   = 0.30;   // lens radius
            const CAN_Y    = CEIL_Y - JH + CAN_H*0.5 + 0.02;  // bottom of cross-pieces
            const canGeom  = new THREE.CylinderGeometry(CAN_R, CAN_R, CAN_H, 12);
            const lensGeom = new THREE.CircleGeometry(LENS_R, 12);

            // joistXs = Z positions of width-spanning joists
            // crossZs  = X positions of depth-spanning cross-pieces
            for (let zi = 0; zi < joistXs.length - 1; zi++) {
                const lz = (joistXs[zi] + joistXs[zi+1]) * 0.5;
                for (let xi = 0; xi < crossZs.length - 1; xi++) {
                    if ((zi + xi) % 2 !== 0) continue;
                    const lx = (crossZs[xi] + crossZs[xi+1]) * 0.5;
                    const housing = new THREE.Mesh(canGeom, canMat);
                    housing.position.set(lx, CAN_Y, lz);
                    roofGroup.add(housing);
                    const lens = new THREE.Mesh(lensGeom, lensMat);
                    lens.rotation.x = Math.PI * 0.5;
                    lens.position.set(lx, CAN_Y - CAN_H*0.5 - 0.01, lz);
                    roofGroup.add(lens);
                }
            }

            scene.add(roofGroup);
        })();

        // Call downloadRoofGLB() in the browser console to export the roof as a .glb file
        function downloadRoofGLB() {
            const exporter = new GLTFExporter();
            const wasVisible = roofGroup.visible;
            roofGroup.visible = true; // GLTFExporter skips invisible objects
            roofGroup.traverse(c => { c._wasVisible = c.visible; c.visible = true; });
            exporter.parse(roofGroup, (glb) => {
                roofGroup.visible = wasVisible;
                roofGroup.traverse(c => { c.visible = c._wasVisible; });
                const blob = new Blob([glb], { type: 'application/octet-stream' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'roof.glb';
                a.click();
                URL.revokeObjectURL(a.href);
            }, (err) => {
                roofGroup.visible = wasVisible;
                roofGroup.traverse(c => { c.visible = c._wasVisible; });
                console.error('GLTFExporter error:', err);
            }, { binary: true });
        }

        // Procedural concrete wall texture — inspired by boytchev TSL concrete
        // Recreates the bumpy pitted aggregate look using Canvas 2D
        function createConcreteWallTexture() {
            const size = 1024;
            const cv = document.createElement('canvas');
            cv.width = cv.height = size;
            const cx = cv.getContext('2d');

            // Base — near-white concrete
            cx.fillStyle = '#fefefe';
            cx.fillRect(0, 0, size, size);

            // Large-scale tonal variation (cast shadows between bumps)
            for (let i = 0; i < 20; i++) {
                const bx = Math.random() * size;
                const by = Math.random() * size;
                const r  = 80 + Math.random() * 220;
                const light = Math.random() > 0.45;
                // draw in 3×3 grid for seamless tiling
                for (let tx = -1; tx <= 1; tx++) {
                    for (let ty = -1; ty <= 1; ty++) {
                        const ox = bx + tx * size, oy = by + ty * size;
                        const g = cx.createRadialGradient(ox, oy, 0, ox, oy, r);
                        g.addColorStop(0,   light ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.025)');
                        g.addColorStop(1,   'rgba(0,0,0,0)');
                        cx.fillStyle = g;
                        cx.fillRect(0, 0, size, size);
                    }
                }
            }

            // Aggregate bumps — scattered circular highlights + shadow pairs
            // This mimics the raised pebble/bump look of the TSL concrete shader
            const BUMP_COUNT = 420;
            for (let i = 0; i < BUMP_COUNT; i++) {
                const bx = Math.random() * size;
                const by = Math.random() * size;
                const r  = 3 + Math.random() * 14;

                // Shadow (bottom-right)
                for (let tx = -1; tx <= 1; tx++) {
                    for (let ty = -1; ty <= 1; ty++) {
                        const ox = bx + tx * size + r * 0.4;
                        const oy = by + ty * size + r * 0.4;
                        const gs = cx.createRadialGradient(ox, oy, 0, ox, oy, r * 1.1);
                        gs.addColorStop(0,   'rgba(0,0,0,0.04)');
                        gs.addColorStop(1,   'rgba(0,0,0,0)');
                        cx.fillStyle = gs;
                        cx.beginPath();
                        cx.arc(ox, oy, r * 1.1, 0, Math.PI * 2);
                        cx.fill();
                    }
                }
                // Highlight (top-left)
                for (let tx = -1; tx <= 1; tx++) {
                    for (let ty = -1; ty <= 1; ty++) {
                        const ox = bx + tx * size - r * 0.3;
                        const oy = by + ty * size - r * 0.3;
                        const gh = cx.createRadialGradient(ox, oy, 0, ox, oy, r * 0.85);
                        gh.addColorStop(0,   'rgba(255,255,255,0.28)');
                        gh.addColorStop(1,   'rgba(255,255,255,0)');
                        cx.fillStyle = gh;
                        cx.beginPath();
                        cx.arc(ox, oy, r * 0.85, 0, Math.PI * 2);
                        cx.fill();
                    }
                }
            }

            // Fine speckle — cement paste grain
            for (let i = 0; i < 35000; i++) {
                const px = Math.random() * size;
                const py = Math.random() * size;
                const v  = Math.floor(Math.random() * 12) - 6;
                const a  = 0.01 + Math.random() * 0.025;
                const b  = 248 + v;
                cx.fillStyle = `rgba(${b},${b-2},${b-4},${a})`;
                cx.fillRect(px, py, 1, 1);
            }

            // Hairline surface cracks (kept away from edges to avoid seam artifacts)
            cx.strokeStyle = 'rgba(180,176,170,0.12)';
            const margin = size * 0.12;
            for (let i = 0; i < 6; i++) {
                cx.lineWidth = 0.4 + Math.random() * 0.5;
                cx.beginPath();
                let px = margin + Math.random() * (size - margin * 2);
                let py = margin + Math.random() * (size - margin * 2);
                cx.moveTo(px, py);
                for (let s = 0; s < 5 + Math.floor(Math.random() * 5); s++) {
                    px = Math.max(margin, Math.min(size - margin, px + (Math.random() - 0.5) * 70));
                    py = Math.max(margin, Math.min(size - margin, py + (Math.random() - 0.5) * 70));
                    cx.lineTo(px, py);
                }
                cx.stroke();
            }

            const tex = new THREE.CanvasTexture(cv);
            tex.wrapS = THREE.MirroredRepeatWrapping;
            tex.wrapT = THREE.MirroredRepeatWrapping;
            tex.repeat.set(4, 4);
            tex.magFilter = THREE.LinearFilter;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            return tex;
        }

        const wallTexture = createConcreteWallTexture();

        // Create procedural brick texture for Wall0
        function createBrickTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const brickWidth = 45;
            const brickHeight = 25;
            const mortar = 1;
            const brickColor = '#6B3410';  // Dark brick red
            const mortarColor = '#D3B7A0';  // Natural mortar tan
            
            // Fill background with mortar color
            ctx.fillStyle = mortarColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw bricks
            for (let y = 0; y < canvas.height; y += brickHeight + mortar) {
                const offset = ((y / (brickHeight + mortar)) % 2) * (brickWidth / 2);
                for (let x = -offset; x < canvas.width; x += brickWidth + mortar) {
                    ctx.fillStyle = brickColor;
                    ctx.fillRect(x, y, brickWidth, brickHeight);
                    
                    // Add brick texture variation - darker shadows
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(x, y, brickWidth, 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(x, y, 2, brickHeight);
                    
                    // Add highlight on bottom and right
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(x, y + brickHeight - 2, brickWidth, 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(x + brickWidth - 2, y, 2, brickHeight);
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);

        // Create procedural rough clay texture for pedestals (TSL-inspired)
        // Rough clay texture — Voronoi platelet approach matching boytchev TSL rough-clay
        // Raised irregular cell centers with dark grooves between them (terracotta palette)
        function createRoughClayTexture() {
            const size = 256; // computed via pixel loop; mip-mapped up to display size
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Off-white base palette
            const BR = 240, BG = 237, BB = 232;

            // Voronoi cell centers — toroidal (seamlessly tileable)
            const N = 55;
            const cells = Array.from({length: N}, () => [Math.random() * size, Math.random() * size]);

            const img = ctx.createImageData(size, size);
            const d = img.data;

            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    let f1 = Infinity, f2 = Infinity;
                    for (let i = 0; i < N; i++) {
                        // Toroidal distance for seamless tiling
                        let dx = px - cells[i][0];
                        let dy = py - cells[i][1];
                        dx -= Math.round(dx / size) * size;
                        dy -= Math.round(dy / size) * size;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < f1) { f2 = f1; f1 = dist; }
                        else if (dist < f2) { f2 = dist; }
                    }

                    // edge = 0 at cell boundary, ramps up toward cell interior
                    const edge = Math.min((f2 - f1) / 10, 1.0);

                    // Raised bump: bright at center, grooved/dark at edge
                    const raise =  edge * 0.20 - 0.02;
                    const groove = Math.pow(1 - edge, 2.2) * 0.28;

                    // Slight per-pixel noise for grain
                    const grain = (Math.random() - 0.5) * 10;

                    const idx = (py * size + px) * 4;
                    d[idx]   = Math.max(0, Math.min(255, BR + raise * 65  - groove * 50  + grain));
                    d[idx+1] = Math.max(0, Math.min(255, BG + raise * 42  - groove * 35  + grain * 0.8));
                    d[idx+2] = Math.max(0, Math.min(255, BB + raise * 25  - groove * 22  + grain * 0.6));
                    d[idx+3] = 255;
                }
            }

            ctx.putImageData(img, 0, 0);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.MirroredRepeatWrapping;
            texture.wrapT = THREE.MirroredRepeatWrapping;
            texture.repeat.set(3, 3);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }
        
        const roughClayTexture = createRoughClayTexture();
        
        // Create procedural stars texture
        function createStarsTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Dark background (00001d)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Star color (ffe8de - warm white/beige)
            const starColor = '#dedede';
            
            // Settings
            const scale = 2;
            const density = .1;
            const variation = 0;
            
            // Generate stars
            const numStars = Math.floor(canvas.width * canvas.height * density / 100);
            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * scale * 0.5 + 0.5;
                const opacity = 0.3 + Math.random() * (1 - variation * 0.3);
                
                ctx.fillStyle = starColor;
                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

        // Create procedural roman paving texture
        function createRomanPavingTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Mortar color (light grey)
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stone colors palette
            const stoneColors = ['#9b8b77', '#a89784', '#8b7b6b', '#b5a595', '#a08070'];
            
            // Settings
            const scale = 2;
            const depth = 0.5;
            
            // Draw roman paving stones - rectangular pattern
            const stoneWidth = 80 / scale;
            const stoneHeight = 50 / scale;
            const mortarWidth = 2;
            
            for (let y = 0; y < canvas.height; y += stoneHeight + mortarWidth) {
                // Offset every other row for brick-like pattern
                const offset = ((y / (stoneHeight + mortarWidth)) % 2) * (stoneWidth / 2);
                for (let x = -offset; x < canvas.width; x += stoneWidth + mortarWidth) {
                    // Random stone color
                    const color = stoneColors[Math.floor(Math.random() * stoneColors.length)];
                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, stoneWidth, stoneHeight);
                    
                    // Add shadow/depth on top and left
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    ctx.fillRect(x, y, stoneWidth, 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    ctx.fillRect(x, y, 2, stoneHeight);
                    
                    // Add highlight on bottom and right
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.fillRect(x, y + stoneHeight - 2, stoneWidth, 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fillRect(x + stoneWidth - 2, y, 2, stoneHeight);
                    
                    // Add subtle variation/texture within stone
                    for (let i = 0; i < 3; i++) {
                        const spotX = x + Math.random() * stoneWidth;
                        const spotY = y + Math.random() * stoneHeight;
                        ctx.fillStyle = `rgba(0, 0, 0, ${0.05 * Math.random()})`;
                        ctx.fillRect(spotX, spotY, 3, 3);
                    }
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        // Create procedural satin texture
        function createSatinTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Dark background (000014)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Main satin color (2937ff - deep blue)
            const satinColor = '#000000';
            
            // Settings
            const scale = 200;
            
            // Create satin sheen effect with diagonal lines and gradients
            for (let y = 0; y < canvas.height; y += 3 * scale) {
                // Alternating light and dark lines for satin sheen
                if ((y / (3 * scale)) % 2 === 0) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                } else {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                }
                ctx.fillRect(0, y, canvas.width, 2 * scale);
            }
            
            // Add fabric texture with small random variations
            for (let i = 0; i < 2000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const brightness = Math.random() * 0.3;
                ctx.fillStyle = `rgba(0, 0, 0, ${(0.2 + brightness)})`;
                ctx.fillRect(x, y, Math.random() * 2 + 1, 1);
            }
            
            // Add subtle wave pattern for satin sheen
            for (let x = 0; x < canvas.width; x += 40 * scale) {
                const gradient = ctx.createLinearGradient(x, 0, x + 40 * scale, 0);
                gradient.addColorStop(0, 'rgba(100, 150, 255, 0)');
                gradient.addColorStop(0.5, 'rgba(100, 150, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(100, 150, 255, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, 0, 40 * scale, canvas.height);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        // Create procedural crumpled fabric texture
        function createCrumpledFabricTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base colors from the texture
            const mainColor = '#6edeff';      // Cyan main color
            const subColor = '#0d0dde';        // Dark blue sub color
            const bgColor = '#000700';         // Very dark green background
            
            // Fill with background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Create crumpled fabric effect using noise-like pattern
            const scale = 2;
            
            // Create wrinkle patterns
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const width = Math.random() * 60 * scale + 20 * scale;
                const height = Math.random() * 40 * scale + 15 * scale;
                const angle = Math.random() * Math.PI;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                // Draw wrinkles with sub color
                ctx.strokeStyle = subColor;
                ctx.lineWidth = Math.random() * 2 + 0.5;
                ctx.globalAlpha = Math.random() * 0.5 + 0.3;
                ctx.beginPath();
                ctx.ellipse(0, 0, width, height, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            // Add main fabric color with crumpled effect
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 40 * scale + 10 * scale;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, mainColor);
                gradient.addColorStop(0.7, 'rgba(110, 222, 255, 0.5)');
                gradient.addColorStop(1, bgColor);
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Add fabric texture grain
            for (let i = 0; i < 2000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const brightness = Math.random();
                ctx.globalAlpha = brightness * 0.3;
                
                if (brightness > 0.5) {
                    ctx.fillStyle = mainColor;
                } else {
                    ctx.fillStyle = subColor;
                }
                
                ctx.fillRect(x, y, Math.random() * 1 + 0.5, Math.random() * 1 + 0.5);
            }
            
            ctx.globalAlpha = 1.0;
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        function addWallPlanes(child, mat) {
            child.updateWorldMatrix(true, false);
            child.visible = false;  // Hide the actual wall

            const bbox = new THREE.Box3().setFromObject(child);
            const size = bbox.getSize(new THREE.Vector3());
            const center = bbox.getCenter(new THREE.Vector3());

            const minAxis = size.x < size.z ? 'x' : 'z';
            const planeW = minAxis === 'x' ? size.z : size.x;
            const planeH = size.y;

            // Only create one plane on the positive side
            const side = 1;
            const planeGeom = new THREE.PlaneGeometry(planeW, planeH);
            // Clone material and apply clipping plane if it exists
            const planeMat = mat.clone();
            if (modelClippingPlane) {
                planeMat.clippingPlanes = [...(planeMat.clippingPlanes || []), modelClippingPlane];
            }
            const planeMesh = new THREE.Mesh(planeGeom, planeMat);
            planeMesh.position.copy(center);

            if (minAxis === 'x') {
                planeMesh.rotation.y = side === 1 ? Math.PI / 2 : -Math.PI / 2;
                planeMesh.position.x += side * (size.x / 2);
            } else {
                planeMesh.rotation.y = side === -1 ? Math.PI : 0;
                planeMesh.position.z += side * (size.z / 2);
            }

            if(child.name=="Wall11"){
                planeMesh.position.x -= 1;
                planeMesh.position.z += .3;
            }
            else if(child.name=="Wall2"){
                planeMesh.position.z += .5;
                planeMesh.scale.set(1.02,1,1);
            }
            else if(child.name=="Wall8"){
                planeMesh.position.z -= .2;
            }
            else if(child.name=="Wall10"){
                planeMesh.position.x += .05;
                planeMesh.position.z += .5;
            }
            else if(child.name=="Wall1" || child.name=="Wall6"){
                // Scale texture repeat to maintain consistent brick size
                if(mat.map && mat.map.repeat) {
                    const referenceSize = 30;
                    const scaleX = planeW / referenceSize;
                    const scaleY = planeH / referenceSize;
                    planeMat.map = planeMat.map.clone();
                    planeMat.map.repeat.set(2 * scaleX, 3 * scaleY);
                }
                if(child.name=="Wall1"){
                    planeMesh.position.x -= .4;
                    planeMesh.scale.set(.98,1,1);
                }
            }
            else if(child.name=="Wall0"){
                planeMesh.position.x += .65;
                planeMesh.position.z += .3;
                planeMesh.scale.set(1,1,1);
            }
            else if(child.name=="Wall16"){
                planeMesh.position.x -= .4;
            }
            else if(child.name=="Wall6"){
                planeMesh.position.x -= .4;
                planeMesh.scale.set(1.02,1,1);
            }
            scene.add(planeMesh);
        }

                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    const basics = mats.map(m => new THREE.MeshBasicMaterial({
                        map: m.map || null,
                        color: m.color ? m.color.clone() : new THREE.Color(0xffffff),
                        side: THREE.DoubleSide
                    }));
                    child.material = Array.isArray(child.material) ? basics : basics[0];
                }
            });
        }

                        const bbox = new THREE.Box3().setFromObject(child);
                        const size = bbox.getSize(new THREE.Vector3());
                        const center = bbox.getCenter(new THREE.Vector3());

                        // Determine which axis is the thin/normal axis
                        const minAxis = size.x < size.z ? 'x' : 'z';

                            if (minAxis === 'x') {
                                clonedWindow.position.x += side * offset;
                            } else {
                                clonedWindow.position.z += side * offset;
                            }

                            clonedWindow.position.z += .2; // Adjust for model's original position
                           // clonedWindow.position.y -= 3; // Adjust for model's original position
                            // Remove clipping planes from all window materials
                            clonedWindow.traverse((childWindow) => {
                                if (childWindow.isMesh && childWindow.material) {
