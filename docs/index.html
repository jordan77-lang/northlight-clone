<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northlight Gallery - 3D Environment</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 5px;
        }
        #modeSelector {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #showPicker {
            margin-bottom: 10px;
            border-bottom: 1px solid #666;
            padding-bottom: 10px;
        }
        #showPicker label {
            display: block;
            color: white;
            font-size: 12px;
            margin-bottom: 6px;
        }
        #showSelect {
            width: 100%;
            padding: 7px 8px;
            font-size: 12px;
            border-radius: 5px;
            border: 1px solid #666;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            outline: none;
        }
        #showSelect:focus {
            border-color: #aaa;
        }
        .mode-button {
            padding: 8px 15px;
            margin: 5px 0;
            border: 2px solid #666;
            background: rgba(100, 100, 100, 0.5);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .mode-button:hover:not(:disabled) {
            background: rgba(100, 100, 100, 0.8);
            border-color: white;
        }
        .mode-button.active {
            background: rgba(0, 150, 0, 0.8);
            border-color: #00ff00;
        }
        .mode-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #debugCheckbox {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #666;
        }
        #debugCheckbox label {
            display: flex;
            align-items: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 6px;
        }
        #debugCheckbox label:last-child {
            margin-bottom: 0;
        }
        #debugCheckbox .hint {
            font-size: 10px;
            color: #aaa;
            margin: 4px 0 0 22px;
            line-height: 1.35;
        }
        #layoutGuideHud {
            display: none;
            position: fixed;
            bottom: 18px;
            left: 18px;
            max-width: 380px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 220, 255, 0.55);
            border-radius: 8px;
            color: #ffffff;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.55;
            z-index: 120;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        #layoutGuideHud strong {
            color: #7dffcb;
            font-size: 16px;
        }
        #debugCheckbox input {
            margin-right: 8px;
            cursor: pointer;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 200;
        }
        canvas {
            display: block;
        }
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
        }
        /* ── Touch joystick ── */
        #touchJoystick {
            display: none;
            position: fixed;
            bottom: 36px;
            left: 36px;
            width: 120px;
            height: 120px;
            z-index: 200;
            touch-action: none;
            user-select: none;
        }
        #touchJoystick .jBase {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.45);
        }
        #touchJoystick .jKnob {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.55);
            border: 2px solid rgba(255,255,255,0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        /* ── Touch look overlay (right 60% of screen) ── */
        #touchLook {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            z-index: 190;
            touch-action: none;
            user-select: none;
        }
        /* ── QR code modal ── */
        #qrModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        #qrBox {
            background: #fff;
            border-radius: 12px;
            padding: 24px 28px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        #qrBox h3 {
            margin-bottom: 12px;
            font-size: 16px;
            color: #222;
        }
        #qrBox img {
            width: 220px;
            height: 220px;
            display: block;
            margin: 0 auto 12px;
            border: 1px solid #ddd;
        }
        #qrUrl {
            font-size: 10px;
            color: #555;
            word-break: break-all;
            margin-bottom: 14px;
        }
        #qrClose {
            padding: 8px 22px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="modeSelector">
        <div id="showPicker">
            <label for="showSelect">Select Show</label>
            <select id="showSelect">
                <option value="">Loading shows...</option>
            </select>
        </div>
        <button class="mode-button active" id="gameModeBtn">Game Mode</button>
        <button class="mode-button" id="exploreModeBtn">Explore Mode</button>
        <div id="debugCheckbox">
            <label>
                <input type="checkbox" id="debugModeCheckbox">
                Debug labels
            </label>
            <label>
                <input type="checkbox" id="layoutGuideCheckbox">
                Layout Guide
            </label>
            <p class="hint">Wall names + coordinate grid for meta.json art placement</p>
        </div>
    </div>
    <div id="layoutGuideHud"></div>
    <div id="info">
        <h2>Northlight Gallery</h2>
        <div id="controlsInfo">
            <p><strong>Game Mode Controls:</strong></p>
            <p>WASD / Arrow Keys - Move</p>
            <p>Mouse - Look around</p>
            <p style="color: red;text-transform: uppercase;">Click to enter game mode</p>
            <p>ESC - Release mouse</p>
        </div>
    </div>
    <div id="vignette"></div>
    <div id="loading">Loading...</div>

    <!-- QR code modal (shown when WebXR is unavailable) -->
    <div id="qrModal">
        <div id="qrBox">
            <h3>Scan to open on an XR device</h3>
            <img id="qrImg" src="" alt="QR code">
            <p id="qrUrl"></p>
            <button id="qrClose" onclick="document.getElementById('qrModal').style.display='none'">Close</button>
        </div>
    </div>

    <!-- Touch game mode controls -->
    <div id="touchJoystick">
        <div class="jBase"></div>
        <div class="jKnob" id="jKnob"></div>
    </div>
    <div id="touchLook"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="script.js">
    </script>



</body>
</html>
